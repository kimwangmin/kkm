<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>개인 홈페이지</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <!-- 내비게이션 -->
    <nav class="bg-white shadow-sm p-4">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-blue-600">나의 포트폴리오</h1>
            <ul class="flex space-x-4 text-sm">
                <li><a href="#about" class="hover:text-blue-600">소개</a></li>
                <li><a href="#skills" class="hover:text-blue-600">기술</a></li>
                <li><a href="#contact" class="hover:text-blue-600">연락처</a></li>
            </ul>
        </div>
    </nav>

    <!-- 메인 콘텐츠 -->
    <main class="max-w-4xl mx-auto p-6 space-y-12 mt-10">
        
        <!-- 자기소개 섹션 -->
        <section id="about" class="bg-white p-8 rounded-2xl shadow-sm">
            <h2 class="text-3xl font-bold mb-4">안녕하세요!</h2>
            <p class="text-gray-600 leading-relaxed">
                저는 웹 개발과 디자인에 관심이 많은 열정적인 개발자입니다. 
                사용자에게 편리한 경험을 제공하는 서비스를 만드는 것을 목표로 하고 있습니다.
            </p>
        </section>

        <!-- 기술 스택 섹션 -->
        <section id="skills" class="bg-white p-8 rounded-2xl shadow-sm">
            <h2 class="text-2xl font-bold mb-6">기술 스택</h2>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="p-4 bg-blue-50 rounded-lg text-center font-medium text-blue-700">HTML/CSS</div>
                <div class="p-4 bg-blue-50 rounded-lg text-center font-medium text-blue-700">JavaScript</div>
                <div class="p-4 bg-blue-50 rounded-lg text-center font-medium text-blue-700">React</div>
                <div class="p-4 bg-blue-50 rounded-lg text-center font-medium text-blue-700">Tailwind CSS</div>
            </div>
        </section>

        <!-- 연락처 섹션 -->
        <section id="contact" class="bg-white p-8 rounded-2xl shadow-sm">
            <h2 class="text-2xl font-bold mb-4">연락하기</h2>
            <p class="text-gray-600 mb-4">함께 프로젝트를 하거나 궁금한 점이 있다면 언제든 연락주세요.</p>
            <a href="mailto:email@example.com" class="inline-block bg-blue-600 text-white px-6 py-2 rounded-full hover:bg-blue-700 transition">이메일 보내기</a>
        </section>
    </main>

    <!-- 푸터 -->
    <footer class="text-center p-10 text-gray-400 text-sm">
        &copy; 2026 나의 포트폴리오. 모든 권리 보유.
    </footer>

</body>
</html>
